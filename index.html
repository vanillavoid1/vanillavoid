<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void+ | Official SMP Portal</title>

    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;400;900&family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #020204;
            --bg-shimmer: #080810;
            --glass: rgba(255,255,255,0.02);
            --border: rgba(255,255,255,0.06);
            --font-head: 'Unbounded', sans-serif;
            --font-main: 'Syne', sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, var(--bg-shimmer), var(--bg-deep));
            color: white;
            font-family: var(--font-main);
            padding: 40px;
        }

        h1 {
            font-family: var(--font-head);
            margin-bottom: 40px;
        }

        .section-title {
            font-family: var(--font-head);
            font-size: 28px;
            margin-top: 70px;
            margin-bottom: 30px;
        }

        .players-grid,
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .p-card,
        .news-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }

        .p-card {
            text-align: center;
        }

        .p-avatar {
            width: 64px;
            height: 64px;
            border-radius: 14px;
            margin-bottom: 15px;
        }

        .p-nick {
            font-family: var(--font-head);
            font-size: 18px;
            margin-bottom: 8px;
        }

        .p-info-text {
            color: #777;
            font-size: 12px;
        }

        .news-card span {
            font-size: 12px;
            color: #777;
            display: block;
            margin-bottom: 10px;
        }

        .news-card h3 {
            margin-top: 0;
        }

        .loading {
            opacity: 0.5;
        }
    </style>
</head>
<body>

<h1>VOID+</h1>

<div class="section-title">ЖИТЕЛИ СЕРВЕРА</div>

<div id="profiles-container" class="players-grid">
    <div class="loading">Загрузка жителей...</div>
</div>

<div class="section-title">РЫНОК И ОБЪЯВЛЕНИЯ</div>

<div id="board-container" class="news-grid">
    <div class="loading">Загрузка объявлений...</div>
</div>

<!-- PAPAPARSE -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>

const URL_PROFILES =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vTEfE3IRzGzlfhaGj2ea2xEgZM0vgdJJyPvt-lE2LnB-7ruVHo31_0M7BjfFxees5V3Ej8ohi-u58tG/pub?gid=1924822211&single=true&output=csv';

const URL_MARKET =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vTEfE3IRzGzlfhaGj2ea2xEgZM0vgdJJyPvt-lE2LnB-7ruVHo31_0M7BjfFxees5V3Ej8ohi-u58tG/pub?gid=0&single=true&output=csv';


window.addEventListener('DOMContentLoaded', () => {
    loadAllData();
});


async function loadAllData() {
    await fetchData(URL_PROFILES, 'profiles-container', true);
    await fetchData(URL_MARKET, 'board-container', false);
}


async function fetchData(url, targetId, isProfile) {

    const container = document.getElementById(targetId);

    try {

        const response = await fetch(
            url + '&t=' + Date.now(),
            {
                cache: 'no-store'
            }
        );

        const csvText = await response.text();

        const parsed = Papa.parse(csvText, {
            skipEmptyLines: true
        });

        const rows = parsed.data;

        container.innerHTML = '';

        let count = 0;

        for (let i = 1; i < rows.length; i++) {

            const row = rows[i];

            if (!row || row.length < 3) continue;

            const statusIndex = isProfile ? 2 : 5;

            const status =
                (row[statusIndex] || '')
                .toString()
                .trim()
                .toLowerCase();

            if (status !== 'одобрено') continue;

            count++;

            if (isProfile) {

                const nick = row[0] || 'Unknown';
                const date = row[1] || '???';

                container.innerHTML += `
                    <div class="p-card">

                        <img
                            class="p-avatar"
                            src="https://mc-heads.net/avatar/${nick}/64"
                        >

                        <div class="p-nick">
                            ${nick}
                        </div>

                        <div class="p-info-text">
                            С нами с ${date}
                        </div>

                    </div>
                `;

            } else {

                const category = row[0] || '';
                const title = row[1] || '';
                const date = row[2] || '';
                const description = row[3] || '';
                const contact = row[4] || '';

                container.innerHTML += `
                    <div class="news-card">

                        <span>
                            ${category}
                        </span>

                        <h3>
                            ${title}
                        </h3>

                        <p>
                            ${description}
                        </p>

                        <div style="
                            margin-top:15px;
                            border-top:1px solid rgba(255,255,255,0.08);
                            padding-top:10px;
                            font-size:12px;
                            color:#aaa;
                        ">
                            Контакт:
                            <b>${contact}</b>
                        </div>

                    </div>
                `;
            }
        }

        if (count === 0) {

            container.innerHTML = `
                <div class="loading">
                    Пока пусто...
                </div>
            `;
        }

    } catch (err) {

        console.error(err);

        container.innerHTML = `
            <div style="color:red;">
                Ошибка загрузки данных
            </div>
        `;
    }
}

</script>

</body>
</html>
