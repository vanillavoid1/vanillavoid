<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID+ | Official Site</title>
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
        :root {
            --bg: #050505;
            --card: #0d0d0d;
            --accent: #ffffff;
            --text: #e0e0e0;
            --text-dim: #888;
            --border: rgba(255,255,255,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Фоновый эффект звезд */
        .stars-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
            z-index: -1;
        }

        header {
            padding: 40px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: rgba(5,5,5,0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo { font-size: 2rem; font-weight: 900; letter-spacing: -1px; }
        
        nav a {
            color: var(--text-dim);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        nav a:hover { color: var(--accent); }

        section { padding: 80px 10%; }

        h1 { font-size: 3rem; margin-bottom: 40px; text-transform: uppercase; letter-spacing: -1px; }

        /* Сетка жителей */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .profile-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 30px 20px;
            border-radius: 15px;
            text-align: center;
            transition: 0.4s;
        }

        .profile-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }

        .p-avatar img {
            width: 64px;
            height: 64px;
            border-radius: 10px;
            margin-bottom: 15px;
            background: #1a1a1a;
        }

        .p-nick { font-weight: 800; font-size: 1.2rem; }
        .p-date { font-size: 0.7rem; color: var(--text-dim); margin-top: 5px; }

        /* Рынок */
        .board-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .news-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 15px;
        }

        .news-card span { color: var(--text-dim); font-size: 0.8rem; }
        .news-card h3 { margin: 10px 0; color: var(--accent); }

        /* Правила */
        .rules-container { display: flex; gap: 40px; }
        .rules-menu { width: 250px; }
        .r-item {
            padding: 15px;
            cursor: pointer;
            color: var(--text-dim);
            border-left: 2px solid transparent;
            transition: 0.3s;
        }
        .r-item.active {
            color: var(--accent);
            border-left-color: var(--accent);
            background: rgba(255,255,255,0.05);
        }
        .rules-content { flex: 1; min-height: 400px; }
        .rule-block {
            background: var(--card);
            margin-bottom: 10px;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            gap: 20px;
        }
        .rule-block i { color: var(--text-dim); font-style: normal; font-weight: 800; }

        @media (max-width: 768px) {
            .rules-container { flex-direction: column; }
            .rules-menu { width: 100%; display: flex; overflow-x: auto; }
            header { flex-direction: column; gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="stars-bg"></div>

    <header>
        <div class="logo">VOID+</div>
        <nav>
            <a href="#news">Новости</a>
            <a href="#players">Жители</a>
            <a href="#market">Объявления</a>
            <a href="#plugins">Плагины</a>
            <a href="#rules">Правила</a>
        </nav>
    </header>

    <section id="players">
        <h1 data-aos="fade-right">Жители сервера</h1>
        <div class="grid" id="profiles-container">
            <!-- Сюда грузятся игроки -->
        </div>
    </section>

    <hr style="opacity: 0.1; margin: 0 10%;">

    <section id="market">
        <h1 data-aos="fade-right">Рынок и объявления</h1>
        <div class="board-grid" id="board-container">
            <!-- Сюда грузятся объявления -->
        </div>
    </section>

    <section id="rules">
        <h1 data-aos="fade-right">Правила</h1>
        <div class="rules-container">
            <div class="rules-menu">
                <div class="r-item" onclick="loadTab('main', this)">Основные</div>
                <div class="r-item" onclick="loadTab('game', this)">Игровой процесс</div>
                <div class="r-item" onclick="loadTab('chat', this)">Общение</div>
                <div class="r-item" onclick="loadTab('terr', this)">Территории</div>
                <div class="r-item" onclick="loadTab('acc', this)">Аккаунты</div>
                <div class="r-item" onclick="loadTab('mods', this)">Моды</div>
            </div>
            <div class="rules-content" id="rules-target" data-aos="fade-up">
                <!-- Сюда грузятся тексты правил -->
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        // Твои обновленные ссылки
        const URL_PROFILES = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTEfE3IRzGzlfhaGj2ea2xEgZM0vgdJJyPvt-lE2LnB-7ruVHo31_0M7BjfFxees5V3Ej8ohi-u58tG/pub?gid=1924822211&single=true&output=csv';
        const URL_MARKET = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTEfE3IRzGzlfhaGj2ea2xEgZM0vgdJJyPvt-lE2LnB-7ruVHo31_0M7BjfFxees5V3Ej8ohi-u58tG/pub?gid=0&single=true&output=csv';

        async function loadAll() {
            await fetchData(URL_PROFILES, 'profiles-container', true);
            await fetchData(URL_MARKET, 'board-container', false);
        }

        async function fetchData(url, targetId, isProfile) {
            const container = document.getElementById(targetId);
            try {
                // Добавляем t=Date.now чтобы избежать кэширования старых данных
                const response = await fetch(url + `&t=${Date.now()}`);
                const text = await response.text();
                const lines = text.split('\n').map(l => l.split(','));
                
                let html = '';
                let count = 0;

                for(let i = 1; i < lines.length; i++) {
                    const row = lines[i].map(c => c.replace(/^"|"$/g, '').trim());
                    
                    if (isProfile) {
                        const nick = row[0];
                        const status = row[2] ? row[2].toLowerCase() : '';
                        
                        // Показываем только если статус "одобрено"
                        if (nick && nick.length > 1 && status === 'одобрено') {
                            count++;
                            html += `
                                <div class="profile-card" data-aos="zoom-in">
                                    <div class="p-avatar"><img src="https://mc-heads.net/avatar/${nick}/48"></div>
                                    <div class="p-nick">${nick}</div>
                                    <div class="p-date">С нами с ${row[1]}</div>
                                </div>`;
                        }
                    } else {
                        const title = row[1];
                        const status = row[5] ? row[5].toLowerCase() : '';
                        
                        if (title && title.length > 1 && status === 'одобрено') {
                            count++;
                            html += `
                                <div class="news-card" data-aos="fade-up">
                                    <span>${row[2]}</span>
                                    <h3>${title}</h3>
                                    <p>${row[3]}</p>
                                    <div style="margin-top:15px; font-size:0.75rem; border-top:1px solid var(--border); padding-top:10px;">
                                        Связь: <b>${row[4]}</b>
                                    </div>
                                </div>`;
                        }
                    }
                }
                container.innerHTML = count > 0 ? html : '<p style="color:#444; padding:20px;">Пока пусто...</p>';
            } catch(e) {
                console.error("Ошибка:", e);
                container.innerHTML = '<p style="color:red;">Ошибка загрузки</p>';
            }
        }

        // Логика правил (твоя старая)
        const RULES = {
            main: { h: "Основные правила", b: [{ i: "1.0", t: "Доступ с 15 лет." }, { i: "1.1", t: "Согласие обязательно." }] },
            game: { h: "Игровой мир", b: [{ i: "2.1", t: "PvP по согласию." }, { i: "2.3", t: "Гриферство бан." }] },
            chat: { h: "Общение", b: [{ i: "3.1", t: "Без спама." }, { i: "3.5", t: "Код: фембой." }] },
            terr: { h: "Территории", b: [{ i: "4.1", t: "Лимит 500x500." }] },
            acc: { h: "Аккаунты", b: [{ i: "5.1", t: "Без продажи за реал." }] },
            mods: { h: "Модификации", b: [{ i: "6.1", t: "Без читов." }] }
        };

        function loadTab(k, el) {
            document.querySelectorAll('.r-item').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
            const g = RULES[k];
            let h = `<h2>${g.h}</h2>`;
            g.b.forEach(r => h += `<div class="rule-block"><i>${r.i}</i>${r.t}</div>`);
            document.getElementById('rules-target').innerHTML = h;
        }

        // Запуск
        loadTab('main', document.querySelector('.r-item'));
        loadAll();
    </script>
</body>
</html>
